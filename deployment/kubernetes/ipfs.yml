# ============================================================================
# IPFS (Kubo) — Deployment + Service
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipfs
  namespace: qubitcoin
  labels:
    app.kubernetes.io/name: ipfs
    app.kubernetes.io/component: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipfs
        app.kubernetes.io/component: storage
    spec:
      containers:
        - name: ipfs
          image: ipfs/kubo:v0.30.0
          ports:
            - name: swarm
              containerPort: 4001
            - name: api
              containerPort: 5001
            - name: gateway
              containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
      volumes:
        - name: ipfs-data
          persistentVolumeClaim:
            claimName: ipfs-data

---
apiVersion: v1
kind: Service
metadata:
  name: ipfs
  namespace: qubitcoin
  labels:
    app.kubernetes.io/name: ipfs
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 5001
      targetPort: api
    - name: gateway
      port: 8080
      targetPort: gateway
    - name: swarm
      port: 4001
      targetPort: swarm
  selector:
    app.kubernetes.io/name: ipfs

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ipfs-data
  namespace: qubitcoin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
