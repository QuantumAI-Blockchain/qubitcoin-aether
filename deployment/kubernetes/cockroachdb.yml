# ============================================================================
# CockroachDB — StatefulSet + Service (single-node for initial deployment)
# For production multi-node, use CockroachDB Operator or Helm chart
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cockroachdb
  namespace: qubitcoin
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/component: database
spec:
  serviceName: cockroachdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cockroachdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockroachdb
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.2.0
          command:
            - /cockroach/cockroach
            - start-single-node
            - --insecure
            - --listen-addr=0.0.0.0:26257
            - --http-addr=0.0.0.0:8080
            - --store=path=/cockroach/cockroach-data
          ports:
            - name: sql
              containerPort: 26257
            - name: http
              containerPort: 8080
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          livenessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: crdb-data
              mountPath: /cockroach/cockroach-data
  volumeClaimTemplates:
    - metadata:
        name: crdb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 500Gi
        storageClassName: standard

---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb
  namespace: qubitcoin
  labels:
    app.kubernetes.io/name: cockroachdb
spec:
  type: ClusterIP
  ports:
    - name: sql
      port: 26257
      targetPort: sql
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: cockroachdb
