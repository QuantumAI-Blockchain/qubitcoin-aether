[[items]]
id = "aether-hms-phi"
title = "HMS-Phi Formula"
content = """
HMS-Phi = phi_micro^(1/phi) * phi_meso^(1/phi^2) * phi_macro^(1/phi^3)
where phi = 1.618... (golden ratio).
Multiplicative: any zero kills the result. phi_meso=0 is the #1 blocker.
phi_micro from IIT 3.0 approximation, phi_meso from domain cluster MIP,
phi_macro from cross-cluster integration.
"""
tags = ["phi", "iit", "integration", "formula"]

