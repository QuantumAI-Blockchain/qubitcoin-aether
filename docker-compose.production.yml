version: '3.9'

services:
  cockroachdb-1:
    image: cockroachdb/cockroach:v24.2.0
    container_name: qbc-cockroachdb-1
    hostname: cockroach-1
    command: >
      start
      --certs-dir=/certs
      --listen-addr=0.0.0.0:26257
      --http-addr=0.0.0.0:8080
      --advertise-addr=cockroach-1:26257
      --join=cockroach-1:26257
      --log-dir=/cockroach/logs
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - ./certs/node1:/certs:ro
      - ./data/cockroach:/cockroach/cockroach-data
      - ./logs:/cockroach/logs
    networks:
      - qbc-network
    restart: unless-stopped

networks:
  qbc-network:
    driver: bridge
