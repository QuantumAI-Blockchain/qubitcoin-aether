# ============================================================================
# Qubitcoin Production Stack
# All services inline — no profiles needed. Ready for Digital Ocean deployment.
#
# Usage:
#   cp .env.production.example .env
#   python3 scripts/setup/generate_keys.py   # Creates secure_key.env
#   docker compose -f docker-compose.production.yml up -d
#
# Requirements:
#   - .env and secure_key.env must exist in project root
#   - DNS: api.qbc.network → this server's IP (for SSL)
#   - Firewall: allow 80, 443, 4001 (P2P), 50051 (gRPC)
# ============================================================================

services:
  # ── CockroachDB (single-node, TLS-secured) ──────────────────────────────
  #
  # IMPORTANT: Before first run, generate CockroachDB certificates:
  #
  #   mkdir -p certs/cockroach
  #   cockroach cert create-ca --certs-dir=certs/cockroach --ca-key=certs/cockroach/ca.key
  #   cockroach cert create-node localhost cockroachdb 127.0.0.1 \
  #       --certs-dir=certs/cockroach --ca-key=certs/cockroach/ca.key
  #   cockroach cert create-client root \
  #       --certs-dir=certs/cockroach --ca-key=certs/cockroach/ca.key
  #
  #   Ensure the ca.key file is stored securely and NOT mounted into the container.
  #   Only the certs directory (without ca.key) should be mounted.
  #
  cockroachdb:
    image: cockroachdb/cockroach:v25.2.12
    container_name: qbc-cockroachdb
    command: start-single-node --certs-dir=/cockroach/certs
    volumes:
      - cockroach-data:/cockroach/cockroach-data
      - ./certs/cockroach:/cockroach/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/cockroach/certs/ca.crt", "https://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qbc-net
    restart: unless-stopped
    # No exposed ports — internal only. Access via docker exec if needed:
    #   docker exec -it qbc-cockroachdb ./cockroach sql --certs-dir=/cockroach/certs

  # ── Database initialization ─────────────────────────────────────────────
  db-init:
    image: cockroachdb/cockroach:v25.2.12
    container_name: qbc-db-init
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./sql/:/sql/:ro
      - ./sql_new/:/sql_new/:ro
      - ./certs/cockroach:/cockroach/certs:ro
    entrypoint: >
      /bin/sh -c "
        echo '=== Qubitcoin DB Init: Creating database ===' &&
        cockroach sql --certs-dir=/cockroach/certs --host=cockroachdb:26257 -e 'CREATE DATABASE IF NOT EXISTS qbc;' &&
        echo '=== Loading core schemas (sql_new/) ===' &&
        for dir in qbc agi qvm research shared bridge stablecoin; do
          if [ -d /sql_new/$$dir ]; then
            for f in /sql_new/$$dir/*.sql; do
              echo \"  Loading $$f\" &&
              cockroach sql --certs-dir=/cockroach/certs --host=cockroachdb:26257 --database=qbc < $$f || true;
            done;
          fi;
        done &&
        echo '=== Loading genesis block ===' &&
        cockroach sql --certs-dir=/cockroach/certs --host=cockroachdb:26257 --database=qbc < /sql/09_genesis_block.sql || true &&
        echo '=== Qubitcoin DB Init: Complete ==='
      "
    networks:
      - qbc-net

  # ── IPFS (Kubo) ─────────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:v0.30.0
    container_name: qbc-ipfs
    volumes:
      - ipfs-data:/data/ipfs
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - qbc-net
    restart: unless-stopped
    # No exposed ports — internal only. Node connects via Docker network.

  # ── Redis (caching, rate limiting) ──────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: qbc-redis
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - qbc-net
    restart: unless-stopped
    # No exposed ports — internal only.

  # ── Qubitcoin Node ──────────────────────────────────────────────────────
  qbc-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qbc-node
    ports:
      - "5000:5000"     # RPC API (proxied by Nginx in production)
      - "4001:4001"     # P2P — must be publicly accessible for peers
      - "50051:50051"   # gRPC P2P bridge — must be accessible for peers
    env_file:
      - .env
      - secure_key.env
    environment:
      - DATABASE_URL=postgresql://root@cockroachdb:26257/qbc?sslmode=require
      - IPFS_API=/ip4/ipfs/tcp/5001/http
      - IPFS_GATEWAY_PORT=8080
      - DEBUG=false
    depends_on:
      db-init:
        condition: service_completed_successfully
      ipfs:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - node-data:/app/data
      - node-logs:/app/logs
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Nginx (reverse proxy + SSL termination) ─────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: qbc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - qbc-node
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Certbot (SSL certificate auto-renewal) ──────────────────────────────
  certbot:
    image: certbot/certbot:v3.1.0
    container_name: qbc-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: qbc-prometheus
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    depends_on:
      - qbc-node
    networks:
      - qbc-net
    restart: unless-stopped
    # No exposed ports — access via Grafana or SSH tunnel.

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: qbc-grafana
    ports:
      - "127.0.0.1:3001:3000"  # Localhost only — access via SSH tunnel
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-CHANGE_ME_BEFORE_LAUNCH}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://api.qbc.network/grafana/
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Loki (log aggregation) ──────────────────────────────────────────────
  loki:
    image: grafana/loki:3.3.0
    container_name: qbc-loki
    volumes:
      - loki-data:/loki
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Promtail (log collection agent) ─────────────────────────────────────
  promtail:
    image: grafana/promtail:3.3.0
    container_name: qbc-promtail
    volumes:
      - ./config/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - node-logs:/var/log/qbc:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - qbc-net
    restart: unless-stopped

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  cockroach-data:
  ipfs-data:
  redis-data:
  node-data:
  node-logs:
  prometheus-data:
  grafana-data:
  loki-data:
  certbot-conf:
  certbot-www:

# ── Network ────────────────────────────────────────────────────────────────
networks:
  qbc-net:
    driver: bridge
