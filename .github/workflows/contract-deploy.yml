name: Contract Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target (testnet or dry-run)'
        required: true
        default: 'dry-run'
        type: choice
        options:
          - dry-run
          - testnet
      rpc_url:
        description: 'RPC URL for testnet deployment'
        required: false
        default: 'http://localhost:5000'
  push:
    branches:
      - 'deploy/**'

jobs:
  # ── Validate Solidity Contracts ─────────────────────────────────────
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest rich numpy scipy sqlalchemy pydantic fastapi
          pip install psycopg2-binary prometheus_client httpx python-dotenv

      - name: Validate contract structure
        run: |
          python scripts/deploy/validate_contracts.py --verbose --deploy-order

      - name: Run contract validation tests
        run: |
          python -m pytest tests/unit/test_contract_validation.py -v --tb=short -x

  # ── Dry-Run Deployment ──────────────────────────────────────────────
  dry-run:
    name: Dry-Run Deploy
    runs-on: ubuntu-latest
    needs: validate-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest rich numpy scipy sqlalchemy pydantic fastapi
          pip install psycopg2-binary prometheus_client httpx python-dotenv requests

      - name: Generate test keys
        run: |
          python scripts/setup/generate_keys.py

      - name: Dry-run QUSD deployment
        run: |
          python scripts/deploy/deploy_qusd.py --dry-run

      - name: Dry-run full contract deployment
        run: |
          python scripts/deploy/deploy_contracts.py --dry-run || true

  # ── Testnet Deployment ──────────────────────────────────────────────
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [validate-contracts, dry-run]
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testnet')
    environment: testnet

    services:
      cockroachdb:
        image: cockroachdb/cockroach:v25.2.12
        ports:
          - 26257:26257
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health?ready=1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        env:
          COCKROACH_ARGS: "start-single-node --insecure"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize database schemas
        run: |
          curl -sL https://binaries.cockroachdb.com/cockroach-v25.2.12.linux-amd64.tgz | tar xz
          export PATH="$PWD/cockroach-v25.2.12.linux-amd64:$PATH"
          cockroach sql --insecure --host=localhost:26257 -e 'CREATE DATABASE IF NOT EXISTS qbc;'
          for dir in qbc agi qvm research shared bridge stablecoin; do
            if [ -d "sql_new/$dir" ]; then
              for f in sql_new/$dir/*.sql; do
                cockroach sql --insecure --host=localhost:26257 --database=qbc < "$f" || true
              done
            fi
          done

      - name: Generate deployment keys
        run: |
          python scripts/setup/generate_keys.py

      - name: Start node in background
        run: |
          cd src && python run_node.py &
          sleep 10
          curl --retry 5 --retry-delay 2 http://localhost:5000/health
        env:
          DATABASE_URL: postgresql://root@localhost:26257/qbc?sslmode=disable
          AUTO_MINE: "true"
          CHAIN_ID: "3302"

      - name: Deploy contracts
        run: |
          RPC_URL="${{ github.event.inputs.rpc_url || 'http://localhost:5000' }}"
          python scripts/deploy/deploy_contracts.py --rpc-url "$RPC_URL" || true
          python scripts/deploy/deploy_qusd.py --rpc-url "$RPC_URL" || true
        env:
          DATABASE_URL: postgresql://root@localhost:26257/qbc?sslmode=disable

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-results
          path: |
            contract_registry.json
