name: QVM CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'qubitcoin-qvm/**'
  pull_request:
    branches: [main]
    paths:
      - 'qubitcoin-qvm/**'

env:
  GO_VERSION: '1.23'
  GOLANGCI_LINT_VERSION: 'v1.62'

jobs:
  # ─── Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: qubitcoin-qvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: qubitcoin-qvm/go.sum
      - run: make build

  # ─── Test ───────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    defaults:
      run:
        working-directory: qubitcoin-qvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: qubitcoin-qvm/go.sum
      - run: make test
      - run: make test-coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: qubitcoin-qvm/coverage.html

  # ─── Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: qubitcoin-qvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: qubitcoin-qvm/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: qubitcoin-qvm
      - run: go vet ./...

  # ─── Benchmark ─────────────────────────────────────────────────────
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: qubitcoin-qvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: qubitcoin-qvm/go.sum
      - run: make bench | tee benchmark-results.txt
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: qubitcoin-qvm/benchmark-results.txt

  # ─── Security Scan ─────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: qubitcoin-qvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: qubitcoin-qvm/go.sum
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  # ─── Docker Build ──────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: qubitcoin-qvm
          file: qubitcoin-qvm/deployments/docker/Dockerfile
          push: false
          tags: qubitcoin-qvm:${{ github.sha }}
