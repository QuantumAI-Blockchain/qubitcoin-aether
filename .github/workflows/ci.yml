name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Python Backend Tests ───────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest rich numpy scipy sqlalchemy pydantic fastapi
          pip install psycopg2-binary prometheus_client httpx python-dotenv
          # Skip heavy optional deps (Qiskit, gRPC) — conftest stubs them

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short -x
        env:
          PYTHONDONTWRITEBYTECODE: 1

  # ── Integration Tests (requires CockroachDB) ──────────────────
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend-test

    services:
      cockroachdb:
        image: cockroachdb/cockroach:v25.2.12
        ports:
          - 26257:26257
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/health?ready=1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
        env:
          COCKROACH_ARGS: "start-single-node --insecure"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest rich numpy scipy sqlalchemy pydantic fastapi
          pip install psycopg2-binary prometheus_client httpx python-dotenv

      - name: Initialize database schemas
        run: |
          # Install CockroachDB CLI for SQL execution
          curl -sL https://binaries.cockroachdb.com/cockroach-v25.2.12.linux-amd64.tgz | tar xz
          export PATH="$PWD/cockroach-v25.2.12.linux-amd64:$PATH"
          cockroach sql --insecure --host=localhost:26257 -e 'CREATE DATABASE IF NOT EXISTS qbc;'
          for dir in qbc agi qvm research shared bridge stablecoin; do
            if [ -d "sql_new/$dir" ]; then
              for f in sql_new/$dir/*.sql; do
                cockroach sql --insecure --host=localhost:26257 --database=qbc < "$f" || true
              done
            fi
          done

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short -x
        env:
          DATABASE_URL: postgresql://root@localhost:26257/qbc?sslmode=disable
          PYTHONDONTWRITEBYTECODE: 1

  # ── Security Scanning (SAST) ──────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run Bandit (SAST)
        run: |
          bandit -r src/qubitcoin/ -f json -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            -x src/qubitcoin/contracts/solidity
          bandit -r src/qubitcoin/ \
            --severity-level medium \
            --confidence-level medium \
            -x src/qubitcoin/contracts/solidity \
            -f txt

      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install -r requirements.txt
          pip-audit --format json --output pip-audit-report.json
          pip-audit

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            pip-audit-report.json

  # ── Python Linting ─────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check all Python files
        run: |
          python -m py_compile src/qubitcoin/config.py
          python -m py_compile src/qubitcoin/consensus/engine.py
          python -m py_compile src/qubitcoin/qvm/vm.py
          python -m py_compile src/qubitcoin/qvm/opcodes.py
          python -m py_compile src/qubitcoin/qvm/state.py
          python -m py_compile src/qubitcoin/aether/knowledge_graph.py
          python -m py_compile src/qubitcoin/aether/phi_calculator.py
          python -m py_compile src/qubitcoin/aether/reasoning.py
          python -m py_compile src/qubitcoin/aether/sephirot.py
          python -m py_compile src/qubitcoin/aether/csf_transport.py
          python -m py_compile src/qubitcoin/aether/pineal.py
          python -m py_compile src/qubitcoin/aether/memory.py
          python -m py_compile src/qubitcoin/aether/safety.py
          python -m py_compile src/qubitcoin/aether/knowledge_extractor.py
          python -m py_compile src/qubitcoin/aether/task_protocol.py
          python -m py_compile src/qubitcoin/aether/consciousness.py
          python -m py_compile src/qubitcoin/aether/sephirot_nodes.py
          python -m py_compile src/qubitcoin/privacy/commitments.py
          python -m py_compile src/qubitcoin/privacy/range_proofs.py
          python -m py_compile src/qubitcoin/privacy/stealth.py
          python -m py_compile src/qubitcoin/privacy/susy_swap.py

  # ── Frontend Build ─────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_RPC_URL: http://localhost:5000
          NEXT_PUBLIC_WS_URL: ws://localhost:5000/ws
          NEXT_PUBLIC_CHAIN_ID: "3303"
