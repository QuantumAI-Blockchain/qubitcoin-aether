[package]
name = "qbc-kyber-transport"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Post-quantum P2P encryption — hybrid Noise + ML-KEM-768 (Kyber) transport layer"

[dependencies]
# ML-KEM / Kyber key encapsulation
ml-kem = "0.2"

# AES-256-GCM for symmetric encryption
aes-gcm = "0.10"

# Key derivation
hkdf = "0.12"
sha2 = "0.10"

# Random number generation
rand = "0.8"

# Logging
log = { workspace = true }

# Async
tokio = { workspace = true, features = ["io-util", "net", "sync"] }
futures = { workspace = true }

# Serialization for handshake messages
codec = { workspace = true, features = ["std"] }

# Error handling
thiserror = "2.0"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "io-util"] }
