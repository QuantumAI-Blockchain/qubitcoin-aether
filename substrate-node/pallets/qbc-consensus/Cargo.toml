[package]
name = "pallet-qbc-consensus"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "VQE proof validation and difficulty adjustment for Qubitcoin PoSA consensus"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
qbc-primitives = { workspace = true }
pallet-qbc-economics = { workspace = true }
pallet-qbc-utxo = { workspace = true }
pallet-timestamp = { workspace = true }
vqe-verifier = { workspace = true }
bimetric-physics = { workspace = true }
sp-io = { workspace = true }
log = { workspace = true }

[dev-dependencies]
sha2 = "0.10"
hex = "0.4"
pallet-qbc-dilithium = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-std/std",
    "qbc-primitives/std",
    "pallet-qbc-economics/std",
    "pallet-qbc-utxo/std",
    "pallet-timestamp/std",
    "vqe-verifier/std",
    "bimetric-physics/std",
    "sp-io/std",
]
runtime-benchmarks = ["frame-support/runtime-benchmarks", "frame-system/runtime-benchmarks"]
try-runtime = ["frame-support/try-runtime", "frame-system/try-runtime"]
