[package]
name = "pallet-qbc-reversibility"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Governed transaction reversibility — multi-sig reversal within a time window"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
log = { workspace = true }

# Local dependencies
qbc-primitives = { workspace = true }
pallet-qbc-utxo = { workspace = true }
pallet-qbc-dilithium = { workspace = true }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-std/std",
    "qbc-primitives/std",
    "pallet-qbc-utxo/std",
    "pallet-qbc-dilithium/std",
]
runtime-benchmarks = [
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]
try-runtime = [
    "frame-support/try-runtime",
    "frame-system/try-runtime",
]
