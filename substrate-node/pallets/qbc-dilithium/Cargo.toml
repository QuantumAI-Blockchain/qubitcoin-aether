[package]
name = "pallet-qbc-dilithium"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Dilithium5 (NIST Level 5) post-quantum signature verification pallet for Qubitcoin"

[dependencies]
codec = { workspace = true }
scale-info = { workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-benchmarking = { workspace = true, optional = true }
sp-core = { workspace = true }
sp-runtime = { workspace = true }
sp-std = { workspace = true }
qbc-primitives = { workspace = true }
sp-io = { workspace = true }
log = { workspace = true }

# Post-quantum crypto — only in std builds (not WASM)
pqcrypto-dilithium = { workspace = true, optional = true }
pqcrypto-traits = { workspace = true, optional = true }

[dev-dependencies]
sp-io = { workspace = true, features = ["std"] }

[features]
default = ["std"]
std = [
    "codec/std",
    "scale-info/std",
    "frame-support/std",
    "frame-system/std",
    "sp-core/std",
    "sp-runtime/std",
    "sp-std/std",
    "sp-io/std",
    "qbc-primitives/std",
    "pqcrypto-dilithium",
    "pqcrypto-traits",
]
runtime-benchmarks = [
    "frame-benchmarking/runtime-benchmarks",
    "frame-support/runtime-benchmarks",
    "frame-system/runtime-benchmarks",
]
try-runtime = ["frame-support/try-runtime", "frame-system/try-runtime"]
