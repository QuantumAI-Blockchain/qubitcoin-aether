version: '3.8'  # you can remove this line if Docker warns it's obsolete

services:
  # CockroachDB
  cockroachdb:
    image: cockroachdb/cockroach:v24.2.0
    container_name: qbc-cockroachdb
    ports:
      - "26257:26257"  # SQL client
      - "8080:8080"    # Web UI
    volumes:
      - ./data/cockroach:/cockroach/cockroach-data
    command: start-single-node --insecure --advertise-addr=localhost
    networks:
      - qbc-network

  # IPFS
  ipfs:
    image: ipfs/kubo:v0.30.0
    container_name: qbc-ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8081:8080"
    volumes:
      - ./data/ipfs:/data/ipfs
    networks:
      - qbc-network

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: qbc-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - qbc-network

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: qbc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./data/prometheus:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - qbc-network

  # Grafana
  grafana:
    image: grafana/grafana:10.2.3
    container_name: qbc-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
    user: "472"
    depends_on:
      - prometheus
    networks:
      - qbc-network

  # Optional: Portainer for managing containers via web UI
  portainer:
    image: portainer/portainer-ce:2.22.1
    container_name: qbc-portainer
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - qbc-network

networks:
  qbc-network:
    driver: bridge

