version: '3.9'

services:
  # CockroachDB - Single node for local development
  # For production, use 3+ node cluster
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.0
    container_name: qbc-cockroachdb
    command: start-single-node --insecure --advertise-addr=cockroachdb
    ports:
      - "26257:26257"  # SQL
      - "8080:8080"    # Admin UI
    volumes:
      - ./data/cockroach:/cockroach/cockroach-data
    networks:
      - qbc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IPFS - Local node for snapshots
  ipfs:
    image: ipfs/kubo:v0.25.0
    container_name: qbc-ipfs
    ports:
      - "4001:4001"    # P2P
      - "5001:5001"    # API
      - "8081:8080"    # Gateway
    volumes:
      - ./data/ipfs:/data/ipfs
    networks:
      - qbc-network
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
      - IPFS_PATH=/data/ipfs

  # Redis - Caching and rate limiting
  redis:
    image: redis:7.2-alpine
    container_name: qbc-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - qbc-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass qbc_redis_pass_change_in_prod

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: qbc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    networks:
      - qbc-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: qbc-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    networks:
      - qbc-network
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_change_in_prod
      - GF_USERS_ALLOW_SIGN_UP=false

networks:
  qbc-network:
    driver: bridge

volumes:
  cockroach-data:
  ipfs-data:
  redis-data:
  prometheus-data:
  grafana-data:
