# ============================================================================
# Qubitcoin Development Stack
# Core backend: CockroachDB + IPFS + Redis + QBC Node
#
# Usage:
#   docker compose up -d                              # Core only (lean, ~2GB RAM)
#   docker compose --profile monitoring up -d         # Core + monitoring stack
#   docker compose --profile production up -d         # Core + nginx/SSL
#   docker compose --profile monitoring --profile production up -d  # Everything
# ============================================================================

services:
  # ── CockroachDB (single-node dev mode) ──────────────────────────────
  cockroachdb:
    image: cockroachdb/cockroach:v25.2.12
    container_name: qbc-cockroachdb
    # Bind to localhost only — reachable from host services (gateway, substrate)
    # but NOT from external network. Use `docker exec` for admin SQL access.
    ports:
      - "127.0.0.1:26257:26257"
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    # SECURITY WARNING [FE-H2]: --insecure disables ALL authentication and
    # encryption. This is acceptable ONLY for local development / CI.
    # For production, use TLS certificates with --certs-dir.
    # See: https://www.cockroachlabs.com/docs/stable/secure-a-cluster
    #
    # --accept-sql-without-tls is an explicit opt-in to allow unencrypted
    # SQL connections, making the security posture visible in the config.
    command: start-single-node --insecure --accept-sql-without-tls --cache=512MiB --max-sql-memory=512MiB
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Database initialization ─────────────────────────────────────────
  db-init:
    image: cockroachdb/cockroach:v25.2.12
    container_name: qbc-db-init
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./sql/:/sql/:ro
      - ./sql_new/:/sql_new/:ro
    entrypoint: >
      /bin/sh -c "
        echo '=== Qubitcoin DB Init ===' &&
        echo '--- Creating databases ---' &&
        cockroach sql --insecure --host=cockroachdb:26257 -e 'CREATE DATABASE IF NOT EXISTS qubitcoin;' &&
        echo '--- Loading schemas (sql_new/) ---' &&
        for dir in qbc agi qvm research shared bridge stablecoin; do
          if [ -d /sql_new/$$dir ]; then
            for f in /sql_new/$$dir/*.sql; do
              echo \"  Loading $$f\" &&
              cockroach sql --insecure --host=cockroachdb:26257 --database=qubitcoin < $$f || true;
            done;
          fi;
        done &&
        echo '=== Qubitcoin DB Init: Complete ==='
      "
    networks:
      - qbc-net

  # ── IPFS (Kubo) ────────────────────────────────────────────────────
  ipfs:
    image: ipfs/kubo:v0.30.0
    container_name: qbc-ipfs
    ports:
      - "4001:4001"     # P2P swarm
      - "5002:5001"     # API (mapped to 5002 to avoid conflicts)
      - "8081:8080"     # Gateway (mapped to 8081 to avoid CockroachDB)
    volumes:
      - ipfs-data:/data/ipfs
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Redis (caching, rate limiting) ──────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: qbc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Rust P2P Daemon (separate container for CPU isolation) ──────────
  qbc-p2p:
    build:
      context: ./rust-p2p
      dockerfile: Dockerfile
    container_name: qbc-p2p
    ports:
      - "4002:4001"     # P2P swarm (host 4002 since IPFS uses 4001)
      - "50051:50051"   # gRPC bridge
    environment:
      - P2P_PORT=4001
      - RUST_P2P_GRPC_ADDR=0.0.0.0:50051
      - RUST_LOG=info,qubitcoin_p2p=debug
      - PEER_SEEDS=${PEER_SEEDS:-}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Qubitcoin Node ──────────────────────────────────────────────────
  qbc-node:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    container_name: qbc-node
    ports:
      - "5001:5000"     # QVM RPC (internal only — gateway owns :5000)
    env_file:
      - .env
      - secure_key.env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - AUTO_MINE=false
      - PYTHONUNBUFFERED=1
      - RPC_HOST=0.0.0.0
      - QBC_CORS_ORIGINS=https://qbc.network,https://app.qbc.network,http://localhost:3000
      - DATABASE_URL=postgresql://root@cockroachdb:26257/qubitcoin?sslmode=disable
      - IPFS_API=/ip4/ipfs/tcp/5001/http
      - IPFS_GATEWAY_PORT=8080
      - AIKGS_GRPC_ADDR=aikgs-sidecar
      - AIKGS_GRPC_PORT=50052
      - AIKGS_AUTH_TOKEN=${AIKGS_AUTH_TOKEN:-}
      # Connect to external P2P daemon (not subprocess)
      - RUST_P2P_GRPC=50051
      - RUST_P2P_GRPC_HOST=qbc-p2p
      # Rust Exchange Engine (Docker container on qbc-net)
      - EXCHANGE_GRPC=qbc-exchange:50053
      # Ollama LLM for Aether Tree reasoning
      - OLLAMA_BASE_URL=http://qbc-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:0.5b}
      - LLM_ENABLED=true
      - LLM_PRIMARY_ADAPTER=ollama
      - LLM_SEEDER_ENABLED=true
      # Phi MIP spectral bisection is expensive — compute every 10 blocks
      - PHI_COMPUTE_INTERVAL=10
      # AI operation intervals — staggered to prevent OOM (4GB limit)
      # Use PRIME numbers to avoid multiple heavy processes on same block
      - AETHER_DEBATE_INTERVAL=7
      - AETHER_CAUSAL_DISCOVERY_INTERVAL=67
      - AETHER_DREAM_ANALOGIES_INTERVAL=97
      - AETHER_SELF_REFLECT_INTERVAL=79
      - AETHER_CONCEPT_FORMATION_INTERVAL=89
      - AETHER_MEMORY_CONSOLIDATE_INTERVAL=71
      - AETHER_EPISODIC_REPLAY_INTERVAL=83
      - AETHER_CURIOSITY_INTERVAL=61
      - AETHER_KNOWLEDGE_DIGEST_INTERVAL=101
      - AETHER_SELF_IMPROVEMENT_INTERVAL=107
      - AETHER_SEPHIROT_PERSIST_INTERVAL=113
      - AETHER_CONTRADICTION_RESOLVE_INTERVAL=73
      # Chain sync: peer RPC URL for catching up on blocks
      - SYNC_PEER_URL=${SYNC_PEER_URL:-}
      # Distributed Graph Shard Service (trillion-node KG)
      - GRAPH_SHARD_ADDR=graph-shard:50053
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db-init:
        condition: service_completed_successfully
      ipfs:
        condition: service_healthy
      redis:
        condition: service_healthy
      qbc-p2p:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    volumes:
      - node-data:/app/data
      - node-logs:/app/logs
      - ./src:/app/src:ro
    networks:
      - qbc-net
    restart: unless-stopped

  # ── AIKGS Rust Sidecar ──────────────────────────────────────────────
  aikgs-sidecar:
    build:
      context: ./aikgs-sidecar
      dockerfile: Dockerfile
    container_name: qbc-aikgs-sidecar
    # NOTE: gRPC port intentionally NOT exposed to host (AIKGS-C1).
    # Only accessible via Docker internal networking (qbc-node → aikgs-sidecar:50052).
    environment:
      - AIKGS_GRPC_PORT=50052
      - AIKGS_AUTH_TOKEN=${AIKGS_AUTH_TOKEN:-}
      - DATABASE_URL=postgresql://root@cockroachdb:26257/qubitcoin?sslmode=disable
      - AIKGS_NODE_RPC_URL=http://qbc-node:5000
      - AIKGS_TREASURY_ADDRESS=${AIKGS_TREASURY_ADDRESS:-}
      # SECURITY [FE-H5]: Vault master key passed as env var for dev only.
      # In production, use a secrets manager (Vault, AWS SM, GCP SM) instead.
      # See .env.example for details.
      - AIKGS_VAULT_MASTER_KEY=${AIKGS_VAULT_MASTER_KEY:-}
      - AIKGS_MAX_SINGLE_DISBURSEMENT=${AIKGS_MAX_SINGLE_DISBURSEMENT:-0.5}
      - AIKGS_MAX_DAILY_DISBURSEMENT=${AIKGS_MAX_DAILY_DISBURSEMENT:-500.0}
      - AIKGS_MAX_DISBURSEMENTS_PER_HOUR=${AIKGS_MAX_DISBURSEMENTS_PER_HOUR:-100}
      - AIKGS_DISBURSE_MAX_RETRIES=${AIKGS_DISBURSE_MAX_RETRIES:-3}
      - AIKGS_DISBURSE_INITIAL_BACKOFF_MS=${AIKGS_DISBURSE_INITIAL_BACKOFF_MS:-1000}
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      db-init:
        condition: service_completed_successfully
      qbc-node:
        condition: service_started
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Ollama (Local LLM for Aether Tree reasoning) ────────────────────
  # CPU-limited to prevent starving the Substrate node and other services.
  # Aether Tree uses this for reasoning — runs qwen2.5:0.5b (small model).
  ollama:
    image: ollama/ollama:latest
    container_name: qbc-ollama
    ports:
      - "11434:11434"   # Ollama API
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_THREAD=2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    networks:
      - qbc-net
    restart: unless-stopped

  # ── QBC Exchange Engine (Rust) ──────────────────────────────────────
  qbc-exchange:
    build:
      context: ./qbc-exchange
      dockerfile: Dockerfile
    container_name: qbc-exchange
    ports:
      - "50053:50053"
    environment:
      - EXCHANGE_GRPC_ADDR=0.0.0.0:50053
      - ORACLE_TTL=60
      - RUST_LOG=info,qbc_exchange=debug
    networks:
      - qbc-net
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: qbc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - qbc-node
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: qbc-grafana
    ports:
      - "3001:3000"     # 3001 to avoid conflict with frontend dev on 3000
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - monitoring

  # Portainer REMOVED — Docker socket exposure = root-equivalent access.
  # Use `docker ps`, `docker logs`, `docker exec` directly for admin tasks.

  # ── Loki (log aggregation) ────────────────────────────────────────────
  loki:
    image: grafana/loki:3.3.0
    container_name: qbc-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Promtail (log collection agent) ───────────────────────────────────
  promtail:
    image: grafana/promtail:3.3.0
    container_name: qbc-promtail
    volumes:
      - ./config/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - node-logs:/var/log/qbc:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - monitoring

  # ── Nginx (reverse proxy + SSL termination) ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: qbc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - qbc-node
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - production

  # ── Certbot (SSL certificate auto-renewal) ───────────────────────────
  certbot:
    image: certbot/certbot:v3.1.0
    container_name: qbc-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - qbc-net
    profiles:
      - production

  # ── API Gateway (Rust) ───────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: qbc-api-gateway
    ports:
      - "5100:5000"     # Host 5100 to avoid conflict with Python node on 5000
    environment:
      - API_LISTEN_ADDR=0.0.0.0:5000
      - SUBSTRATE_WS_URL=ws://172.18.0.1:9944
      - DATABASE_URL=postgresql://root@cockroachdb:26257/qubitcoin?sslmode=disable
      - AETHER_SERVICE_URL=http://qbc-node:5000
      - CHAIN_ID=3303
      - LOG_LEVEL=info
      - RUST_LOG=info,qbc_api_gateway=debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cockroachdb:
        condition: service_healthy
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - substrate

  # ── Block Indexer (Rust) ────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile
    container_name: qbc-indexer
    environment:
      - SUBSTRATE_WS_URL=ws://172.18.0.1:9944
      - DATABASE_URL=postgresql://root@cockroachdb:26257/qubitcoin?sslmode=disable
      - DB_POOL_SIZE=10
      - START_HEIGHT=0
      - BACKFILL=false
      - LOG_LEVEL=info
      - RUST_LOG=info,qbc_indexer=debug
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      cockroachdb:
        condition: service_healthy
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - substrate

  # ── QVM Sidecar (Go) ────────────────────────────────────────────────
  qvm-sidecar:
    build:
      context: ./qubitcoin-qvm
      dockerfile: Dockerfile
    container_name: qbc-qvm-sidecar
    ports:
      - "50055:50053"   # gRPC (host 50055 -> container 50053)
      - "8180:8080"     # HTTP REST/JSON-RPC
    environment:
      - QVM_GRPC_ADDR=:50053
      - QVM_HTTP_ADDR=:8080
      - QVM_CHAIN_ID=3303
      - QVM_LOG_LEVEL=info
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - qbc-net
    restart: unless-stopped
    profiles:
      - substrate

  # ── Aether Graph Shard Service (Distributed KG) ──────────────────────
  graph-shard:
    build:
      context: ./aether-graph-shard
      dockerfile: Dockerfile
    container_name: qbc-graph-shard
    ports:
      - "50054:50053"   # gRPC (host 50054 -> container 50053)
      - "51054:51053"   # Metrics/health HTTP
    volumes:
      - graph-shard-data:/data/graph-shards
    environment:
      GRAPH_SHARD_PORT: "50053"
      GRAPH_SHARD_DATA_DIR: /data/graph-shards
      GRAPH_SHARD_CACHE: "50000"
      RUST_LOG: info
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - qbc-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:51053/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ── Named Volumes ───────────────────────────────────────────────────────
volumes:
  cockroach-data:
  ipfs-data:
  redis-data:
  node-data:
  node-logs:
  ollama-data:
  prometheus-data:
  grafana-data:
  loki-data:
  certbot-conf:
  certbot-www:
  graph-shard-data:

# ── Network ─────────────────────────────────────────────────────────────
networks:
  qbc-net:
    driver: bridge
