[package]
name = "aether-nlp"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "NLP pipeline: summarization, coreference, sentiment, query translation, explanation"

[dependencies]
aether-types = { path = "../aether-types" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
log = "0.4"
regex = "1"
unicode-segmentation = "1.11"

[dev-dependencies]
approx = "0.5"
