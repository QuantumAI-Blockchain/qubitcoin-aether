[package]
name = "aether-safety"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Gevurah veto system and adversarial defense for Aether Tree AGI"

[dependencies]
aether-types = { path = "../aether-types" }
pyo3 = { version = "0.23", features = ["auto-initialize"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
log = "0.4"
regex = "1.10"
chrono = { version = "0.4", features = ["serde"] }
sha2 = "0.10"
hmac = "0.12"
rand = "0.8"

[dev-dependencies]
env_logger = "0.11"
