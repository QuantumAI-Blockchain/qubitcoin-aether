[package]
name = "aether-neural"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Neural reasoner (GAT) for the Aether Tree"

[dependencies]
aether-types = { path = "../aether-types" }
pyo3 = { version = "0.23", features = ["auto-initialize"] }
nalgebra = "0.33"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
rand = "0.8"
log = "0.4"

[dev-dependencies]
approx = "0.5"
