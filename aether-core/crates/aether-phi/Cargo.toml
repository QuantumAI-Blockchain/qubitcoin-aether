[package]
name = "aether-phi"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Phi integration metric and gate system for the Aether Tree"

[dependencies]
aether-types = { path = "../aether-types" }
aether-graph = { path = "../aether-graph" }
pyo3 = { version = "0.23", features = ["auto-initialize"] }
nalgebra = "0.33"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
log = "0.4"
rand = "0.8"

[dev-dependencies]
approx = "0.5"
