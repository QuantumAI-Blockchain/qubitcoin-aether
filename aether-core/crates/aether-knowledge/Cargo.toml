[package]
name = "aether-knowledge"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Knowledge processing: extraction, scoring, seeding, indexing, embeddings, QA"

[dependencies]
aether-types = { path = "../aether-types" }
aether-graph = { path = "../aether-graph" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
log = "0.4"
sha2 = "0.10"
rand = "0.8"
regex = "1"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
approx = "0.5"
