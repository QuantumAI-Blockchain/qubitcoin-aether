[package]
name = "aether-persistence"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Async CockroachDB persistence for the Aether Tree"

[dependencies]
aether-types = { path = "../aether-types" }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "json", "uuid"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
