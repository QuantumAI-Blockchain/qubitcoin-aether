[package]
name = "aether-memory"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Memory systems (working, episodic, vector index) for the Aether Tree"

[dependencies]
aether-types = { path = "../aether-types" }
pyo3 = { version = "0.23", features = ["auto-initialize"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
rand = "0.8"
log = "0.4"
ordered-float = "4.2"
sha2 = "0.10"

[dev-dependencies]
approx = "0.5"
