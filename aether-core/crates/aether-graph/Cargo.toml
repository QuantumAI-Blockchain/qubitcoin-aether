[package]
name = "aether-graph"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Knowledge graph engine for the Aether Tree"

[dependencies]
aether-types = { path = "../aether-types" }
aether-persistence = { path = "../aether-persistence" }
pyo3 = { version = "0.23", features = ["auto-initialize"] }
petgraph = "0.7"
rs_merkle = "1.4"
sha2 = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
parking_lot = "0.12"
ordered-float = "4.2"
log = "0.4"
rand = "0.8"
tokio = { version = "1", features = ["rt"] }

[dev-dependencies]
approx = "0.5"
chrono = "0.4"
tokio = { version = "1", features = ["full", "test-util"] }
