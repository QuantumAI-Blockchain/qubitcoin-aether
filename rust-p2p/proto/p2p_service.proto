syntax = "proto3";

package p2p_service;

service P2P {
  rpc BroadcastBlock(BroadcastRequest) returns (BroadcastResponse);
  rpc GetPeerStats(PeerStatsRequest) returns (PeerStatsResponse);
}

message BroadcastRequest {
  uint64 height = 1;
  string hash = 2;
}

message BroadcastResponse {
  bool success = 1;
}

message PeerStatsRequest {}

message PeerStatsResponse {
  uint32 peer_count = 1;
}
