# ============================================================================
# Nginx Reverse Proxy — Qubitcoin Backend
# SSL/TLS termination with Let's Encrypt certificates.
# Proxies: RPC API (5000), gRPC (50051), WebSocket (/ws)
# Certbot auto-renewal via ACME challenge.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 10m;
    server_tokens off;

    # ── Gzip ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # ── Rate limiting ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=rpc:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream backends ───────────────────────────────────────────────
    upstream qbc_api {
        least_conn;
        server qbc-node:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream qbc_grpc {
        server qbc-node:50051;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        server_name api.qbc.network rpc.qbc.network;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — API + RPC ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.qbc.network rpc.qbc.network;

        # SSL certificates (Let's Encrypt via Certbot)
        ssl_certificate /etc/letsencrypt/live/api.qbc.network/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.qbc.network/privkey.pem;

        # TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── REST API ────────────────────────────────────────────────────
        location / {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn 50;

            proxy_pass http://qbc_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS for frontend
            add_header Access-Control-Allow-Origin "https://qbc.network" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── JSON-RPC (MetaMask) ─────────────────────────────────────────
        location /jsonrpc {
            limit_req zone=rpc burst=10 nodelay;

            proxy_pass http://qbc_api/jsonrpc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket ───────────────────────────────────────────────────
        location /ws {
            proxy_pass http://qbc_api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Metrics (restricted) ────────────────────────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://qbc_api/metrics;
        }

        # ── Admin API (restricted) ──────────────────────────────────────
        location /admin/ {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;

            proxy_pass http://qbc_api/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check ────────────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://qbc_api/health;
        }
    }
}
