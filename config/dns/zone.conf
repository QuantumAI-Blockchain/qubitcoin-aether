; ============================================================================
; DNS Zone Configuration — qbc.network
; Managed via Cloudflare DNS (or any DNS provider).
; This file documents the target DNS records.
; ============================================================================
;
; Apply via:
;   - Cloudflare Dashboard → DNS → Records
;   - Cloudflare API / Terraform
;   - Standard BIND zone file import
;
; TTL values: 1 = Cloudflare auto (proxied), 300 = 5 min, 3600 = 1 hour
; ============================================================================

$ORIGIN qbc.network.
$TTL 300

; ── Root domain → Vercel (frontend) ────────────────────────────────────────
; Vercel uses CNAME flattening at root (Cloudflare supports this)
@                   IN  CNAME   cname.vercel-dns.com.

; ── www redirect → root ───────────────────────────────────────────────────
www                 IN  CNAME   cname.vercel-dns.com.

; ── API subdomain → Backend server ────────────────────────────────────────
; Points to the production server running Nginx + QBC node
; Replace <BACKEND_IP> with actual server IP
api                 IN  A       <BACKEND_IP>
api                 IN  AAAA    <BACKEND_IPV6>

; ── RPC subdomain → Backend (JSON-RPC for MetaMask) ──────────────────────
rpc                 IN  CNAME   api.qbc.network.

; ── P2P network discovery ────────────────────────────────────────────────
; Seed nodes for P2P peer discovery (libp2p + Python P2P)
; Replace with actual seed node IPs
seed1               IN  A       <SEED1_IP>
seed2               IN  A       <SEED2_IP>
seed3               IN  A       <SEED3_IP>

; ── Monitoring (internal, not proxied through Cloudflare) ────────────────
; Grey-cloud these records in Cloudflare (DNS only, no proxy)
grafana             IN  CNAME   api.qbc.network.
prometheus          IN  CNAME   api.qbc.network.

; ── IPFS gateway ─────────────────────────────────────────────────────────
ipfs                IN  CNAME   api.qbc.network.

; ── Mail (MX records for admin@qbc.network) ──────────────────────────────
; Using a mail forwarding service (adjust to your provider)
@                   IN  MX  10  mx1.improvmx.com.
@                   IN  MX  20  mx2.improvmx.com.

; ── SPF record (email authentication) ────────────────────────────────────
@                   IN  TXT     "v=spf1 include:spf.improvmx.com ~all"

; ── DMARC (email anti-spoofing) ──────────────────────────────────────────
_dmarc              IN  TXT     "v=DMARC1; p=quarantine; rua=mailto:admin@qbc.network; pct=100"

; ── Domain verification (Vercel, Google, etc.) ───────────────────────────
; Add verification TXT records as needed:
; @                 IN  TXT     "vercel-verification=xxxxxx"

; ── CAA records (restrict certificate issuance) ──────────────────────────
@                   IN  CAA 0   issue "letsencrypt.org"
@                   IN  CAA 0   issue "digicert.com"
@                   IN  CAA 0   issuewild "letsencrypt.org"
@                   IN  CAA 0   iodef "mailto:admin@qbc.network"

; ── SRV records for P2P discovery ────────────────────────────────────────
; Format: _service._proto.name TTL class SRV priority weight port target
_qbc-p2p._tcp       IN  SRV 10 0 4001 seed1.qbc.network.
_qbc-p2p._tcp       IN  SRV 10 0 4001 seed2.qbc.network.
_qbc-p2p._tcp       IN  SRV 10 0 4001 seed3.qbc.network.
_qbc-grpc._tcp      IN  SRV 10 0 50051 api.qbc.network.
