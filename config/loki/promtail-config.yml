# ============================================================================
# Promtail Configuration — Qubitcoin Log Collection Agent
# Collects logs from all Docker containers and ships to Loki.
# ============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: qubitcoin
    batchwait: 1s
    batchsize: 1048576                    # 1MB
    timeout: 10s
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # ── Docker container logs ────────────────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=qubitcoin"]
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Extract service name from compose label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Extract compose project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
    pipeline_stages:
      # Parse JSON-structured logs from QBC node
      - match:
          selector: '{service="qbc-node"}'
          stages:
            - json:
                expressions:
                  level: level
                  module: module
                  message: msg
                  timestamp: timestamp
            - labels:
                level:
                module:
            - timestamp:
                source: timestamp
                format: "2006-01-02T15:04:05.000Z"
                fallback_formats:
                  - "2006-01-02 15:04:05"
      # Parse CockroachDB logs
      - match:
          selector: '{service="cockroachdb"}'
          stages:
            - regex:
                expression: '^(?P<severity>[IWEF])(?P<date>\d{6}) (?P<time>\d{2}:\d{2}:\d{2}\.\d+) .* (?P<message>.*)$'
            - labels:
                severity:
      # Drop health check noise
      - match:
          selector: '{service=~"cockroachdb|ipfs|redis"}'
          stages:
            - drop:
                expression: '.*health.*ready.*'
                drop_counter_reason: health_check

  # ── QBC node application logs (file-based) ──────────────────────────
  - job_name: qbc-node-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: qbc-node
          source: file
          __path__: /var/log/qbc/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            module: module
      - labels:
          level:
          module:
