groups:
  - name: qubitcoin_critical
    rules:
      - alert: ChainHalt
        expr: increase(qbc_blockchain_height[60s]) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "No new blocks produced in 2 minutes"
          description: "Chain height has not increased. Check substrate node and mining."

      - alert: AetherMindDown
        expr: up{job="aether-mind"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Aether Mind service is down"
          description: "The aether-mind systemd service is not responding."

      - alert: DiskSpaceHigh
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space below 20%"
          description: "Root filesystem has less than 20% free space."

      - alert: CockroachDBDown
        expr: up{job="cockroachdb"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "CockroachDB is down"
          description: "CockroachDB health check is failing."

      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 90% for 5 minutes"
          description: "Sustained high CPU may indicate runaway process or resource exhaustion."
