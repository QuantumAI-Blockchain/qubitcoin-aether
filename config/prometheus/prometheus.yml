# ============================================================================
# Prometheus Configuration — Qubitcoin Monitoring
# Scrapes: QBC Node, CockroachDB, IPFS, Redis
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# ── Alerting (Alertmanager integration, optional) ───────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ── Recording & Alert Rules ─────────────────────────────────────────────
# rule_files:
#   - '/etc/prometheus/rules/*.yml'

# ── Scrape Targets ──────────────────────────────────────────────────────
scrape_configs:
  # Qubitcoin Node — all blockchain, QVM, AGI, and bridge metrics
  - job_name: 'qubitcoin-node'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['qbc-node:5000']
        labels:
          instance: 'node-1'
          chain: 'mainnet'
          chain_id: '3303'

  # CockroachDB — database health and performance
  - job_name: 'cockroachdb'
    metrics_path: '/_status/vars'
    static_configs:
      - targets: ['cockroachdb:8080']
        labels:
          instance: 'crdb-1'

  # IPFS (Kubo) — content-addressed storage metrics
  - job_name: 'ipfs'
    metrics_path: '/debug/metrics/prometheus'
    static_configs:
      - targets: ['ipfs:5001']
        labels:
          instance: 'ipfs-1'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
